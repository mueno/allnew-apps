name: Landing Auto Update

on:
  repository_dispatch:
    types:
      - asc_app_submitted
      - asc_app_released
      - asc_status_changed
  workflow_dispatch:
    inputs:
      reconcile:
        description: "Reconcile released app metadata from App Store Lookup"
        required: false
        default: "false"
      bootstrap:
        description: "Rebuild from catalog bootstrap set"
        required: false
        default: "false"
  schedule:
    - cron: "15 18 * * *"

permissions:
  contents: write
  deployments: write

concurrency:
  group: landing-auto-update-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-landing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Write event payload
        run: |
          cat <<'JSON' > /tmp/landing-event.json
          ${{ toJson(github.event) }}
          JSON

      - name: App Store reconcile mode (schedule or manual)
        if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.reconcile == 'true') }}
        run: |
          python3 landing-automation/scripts/update_landing_data.py --reconcile-app-store

      - name: Bootstrap mode (manual)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.bootstrap == 'true' && inputs.reconcile != 'true' }}
        run: |
          python3 landing-automation/scripts/update_landing_data.py --bootstrap

      - name: Event mode (repository_dispatch)
        if: ${{ github.event_name == 'repository_dispatch' || (github.event_name == 'workflow_dispatch' && inputs.bootstrap != 'true' && inputs.reconcile != 'true') }}
        run: |
          python3 landing-automation/scripts/update_landing_data.py --event-file /tmp/landing-event.json

      - name: Commit changes
        id: commit-changes
        env:
          TARGET_BRANCH: ${{ github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
          RECONCILE_INPUT: ${{ inputs.reconcile }}
          BOOTSTRAP_INPUT: ${{ inputs.bootstrap }}
        run: |
          set -euo pipefail

          if git diff --quiet; then
            echo "No changes"
            echo "changed=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/landing-apps.generated.json landing-automation/state/landing_state.json assets/asc-screenshots

          if git diff --cached --quiet; then
            echo "No staged changes"
            echo "changed=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          git commit -m "chore: auto update landing apps data"

          # Retry push because repository_dispatch events can arrive in bursts.
          # On failure, rebuild from latest branch head with the same event payload.
          for attempt in 1 2 3; do
            if git push origin "HEAD:${TARGET_BRANCH}"; then
              echo "Push succeeded on attempt ${attempt}"
              echo "changed=true" >> "${GITHUB_OUTPUT}"
              exit 0
            fi

            if [ "${attempt}" -eq 3 ]; then
              echo "Push failed after ${attempt} attempts"
              exit 1
            fi

            echo "Push failed on attempt ${attempt}; rebuilding commit from latest ${TARGET_BRANCH}"
            git fetch origin "${TARGET_BRANCH}"
            git reset --hard "origin/${TARGET_BRANCH}"

            if [ "${EVENT_NAME}" = "schedule" ] || { [ "${EVENT_NAME}" = "workflow_dispatch" ] && [ "${RECONCILE_INPUT}" = "true" ]; }; then
              python3 landing-automation/scripts/update_landing_data.py --reconcile-app-store
            elif [ "${EVENT_NAME}" = "workflow_dispatch" ] && [ "${BOOTSTRAP_INPUT}" = "true" ]; then
              python3 landing-automation/scripts/update_landing_data.py --bootstrap
            else
              python3 landing-automation/scripts/update_landing_data.py --event-file /tmp/landing-event.json
            fi

            git add data/landing-apps.generated.json landing-automation/state/landing_state.json assets/asc-screenshots
            if git diff --cached --quiet; then
              echo "No staged changes after refresh"
              echo "changed=false" >> "${GITHUB_OUTPUT}"
              exit 0
            fi
            git commit -m "chore: auto update landing apps data"
            sleep $((attempt * 2))
          done

      - name: Setup Node
        if: ${{ steps.commit-changes.outputs.changed == 'true' }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: landing-automation/cloudflare-worker/package-lock.json

      - name: Install Wrangler
        if: ${{ steps.commit-changes.outputs.changed == 'true' }}
        working-directory: landing-automation/cloudflare-worker
        run: |
          node --version
          npm ci

      - name: Deploy to Cloudflare Pages
        if: ${{ steps.commit-changes.outputs.changed == 'true' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: landing-automation/cloudflare-worker/node_modules/.bin/wrangler pages deploy . --project-name=allnew-apps
